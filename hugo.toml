baseURL = 'https://nthp.me'
languageCode = 'en-us'
title = "Nathan's Site"
theme = 'simple'
publishDir = 'docs'

# sectionPagesMenu = 'main'

# disableKinds = ['rss']



[outputs]
  home = ['html']
  taxonomy = ['html', 'rss']
  section = ['html', 'rss']
  
[mediaTypes]
  [mediaTypes."application/rss"]
  isPlainText = true
  suffixes = ["xml"]
  
[outputFormats]
  [outputFormats.RSS]
  mediatype = "application/rss"
  baseName = "feed"




[services]
  [services.rss]
	limit = -1

[markup.goldmark.renderer]
  unsafe = true # Allow HTML in md files